name: Build & Release Linux Binary

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libwayland-dev wayland-protocols pkg-config

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release -j$(nproc)

    - name: Package Release
      run: |
        mkdir -p release/arthur-bridge
        cp build/libarthur_bridge.so release/arthur-bridge/
        cp arthur-cli.py release/arthur-bridge/
        chmod +x release/arthur-bridge/arthur-cli.py
        cd release && tar -czf arthur-bridge-linux-x86_64.tar.gz arthur-bridge/

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: arthur-bridge-linux-x86_64
        path: release/arthur-bridge-linux-x86_64.tar.gz

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: release/arthur-bridge-linux-x86_64.tar.gz
        generate_release_notes: true
