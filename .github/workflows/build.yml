name: Build & Release AppImage

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libwayland-dev wayland-protocols pkg-config python3-tk

    - name: Install Wine (for bundling)
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y --install-recommends wine64 wine32

    - name: Configure & Build Bridge
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -j$(nproc)

    - name: Setup AppDir
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/lib
        
        # Copy our tools
        cp build/libarthur_bridge.so AppDir/usr/lib/
        cp arthur-cli.py AppDir/usr/bin/
        cp AppRun AppDir/
        cp arthur.desktop AppDir/
        
        # Copy Wine binaries and essential libs
        # This is a simplified bundle; real-world apps use more complex scripts
        cp /usr/bin/wine AppDir/usr/bin/
        cp /usr/bin/wine64 AppDir/usr/bin/
        
        # Create a dummy icon
        touch AppDir/arthur.png

    - name: Download AppImageTool
      run: |
        wget https://github.com/AppImage/AppImageKit/releases/download/13/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage

    - name: Build AppImage
      run: |
        export ARCH=x86_64
        ./appimagetool-x86_64.AppImage AppDir Arthur-v1.0.0-x86_64.AppImage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Arthur-AppImage
        path: Arthur-v1.0.0-x86_64.AppImage

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Arthur-v1.0.0-x86_64.AppImage
        generate_release_notes: true
