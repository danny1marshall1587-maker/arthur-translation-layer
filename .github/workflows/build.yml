name: Build & Release AppImage

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libwayland-dev wayland-protocols pkg-config python3-tk

    - name: Download VST3 Headers
      run: |
        mkdir -p build/_vst3_headers
        git clone --depth 1 https://github.com/steinbergmedia/vst3_pluginterfaces.git build/_vst3_headers/pluginterfaces
        git clone --depth 1 https://github.com/steinbergmedia/vst3_base.git build/_vst3_headers/base

    - name: Configure & Build Bridge (Linux side)
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -j$(nproc)

    - name: Setup AppDir (Standalone Arthur)
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/lib/arthur
        
        # Copy ONLY the Arthur Linux components from the CURRENT build
        cp build/libarthur_bridge.so AppDir/usr/lib/arthur/
        cp arthur-cli.py AppDir/usr/bin/
        cp arthur.png AppDir/
        cp AppRun AppDir/
        cp arthur.desktop AppDir/ 2>/dev/null || true
        
        # If we have build_artifacts in the repo, copy them as fallback
        if [ -d "build_artifacts" ]; then
          mkdir -p AppDir/usr/lib/arthur/fallback
          cp build_artifacts/* AppDir/usr/lib/arthur/fallback/ || true
        fi

    - name: Download AppImageTool
      run: |
        wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage

    - name: Build AppImage
      run: |
        export ARCH=x86_64
        VERSION=${{ github.ref_name }}
        [ "$VERSION" = "main" ] && VERSION="v2.2.0-beta"
        ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir Arthur-${VERSION}-x86_64.AppImage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Arthur-AppImage
        path: Arthur-*-x86_64.AppImage

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Arthur-*-x86_64.AppImage
        generate_release_notes: true
