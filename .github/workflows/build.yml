name: Build & Release AppImage

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Install Build Dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libwayland-dev wayland-protocols pkg-config python3-tk

    - name: Download VST3 Headers
      run: |
        mkdir -p build/_vst3_headers
        git clone --depth 1 https://github.com/steinbergmedia/vst3_pluginterfaces.git build/_vst3_headers/pluginterfaces
        git clone --depth 1 https://github.com/steinbergmedia/vst3_base.git build/_vst3_headers/base

    - name: Install Wine (for Guest cross-compilation)
      run: |
        sudo mkdir -pm755 /etc/apt/keyrings
        sudo wget -O /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
        sudo wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/$(lsb_release -cs)/winehq-$(lsb_release -cs).sources
        sudo apt-get update
        sudo apt-get install -y --install-recommends winehq-stable || sudo apt-get install -y wine64 wine32 wine64-tools
        # Ensure we have the development headers for Wine
        sudo apt-get install -y libwine-dev

    - name: Configure & Build Bridge (Linux side)
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release
        cmake --build build --config Release -j$(nproc)

    - name: Build Guest (Wine side)
      run: |
        # Use winegcc with -I/usr/include/wine/windows to force finding headers
        # This bypasses the need for a working wineboot/display server
        winegcc -m64 -std=c++20 -D_WIN32 \
          -I"build/_vst3_headers" \
          -I"." \
          -I"/usr/include/wine/windows" \
          -I"/usr/include/wine/msvcrt" \
          -Wno-deprecated-declarations \
          -o build/arthur-guest \
          guest.cpp \
          ipc/control-protocol.cpp \
          -lole32 -luuid -lws2_32 -lstdc++
        
        echo "Guest built successfully"
        ls -la build/arthur-guest*

    - name: Setup AppDir & Download Portable Wine
      run: |
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/lib/arthur
        
        # Download Portable Wine
        wget -q https://github.com/GloriousEggroll/wine-ge-custom/releases/download/GE-Proton8-26/wine-lutris-GE-Proton8-26-x86_64.tar.xz
        tar -xf wine-lutris-GE-Proton8-26-x86_64.tar.xz
        
        # Merge Wine files into AppDir/usr
        cp -r lutris-GE-Proton8-26-x86_64/* AppDir/usr/
        
        # Copy Arthur components
        cp build/libarthur_bridge.so AppDir/usr/lib/arthur/
        [ -f build/arthur-guest.exe ] && cp build/arthur-guest.exe AppDir/usr/lib/arthur/
        [ -f build/arthur-guest.exe.so ] && cp build/arthur-guest.exe.so AppDir/usr/lib/arthur/
        [ -f build/arthur-guest ] && cp build/arthur-guest AppDir/usr/lib/arthur/
        cp arthur-cli.py AppDir/usr/bin/
        cp arthur.png AppDir/
        cp AppRun AppDir/
        cp arthur.desktop AppDir/ 2>/dev/null || true

    - name: Download AppImageTool
      run: |
        wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
        chmod +x appimagetool-x86_64.AppImage

    - name: Build AppImage
      run: |
        export ARCH=x86_64
        VERSION=${{ github.ref_name }}
        [ "$VERSION" = "main" ] && VERSION="v2.2.0-beta"
        ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir Arthur-${VERSION}-x86_64.AppImage

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Arthur-AppImage
        path: Arthur-*-x86_64.AppImage

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: Arthur-*-x86_64.AppImage
        generate_release_notes: true
